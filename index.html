<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#101114" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="The Calendar" />
    <title>The Calendar</title>
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="apple-touch-icon" href="icon-192.png" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="layout-grid">
        <aside class="side-panel left-panel" aria-label="Reminders and settings">
          <div class="shabbat-card" id="shabbatCard">
            <div class="shabbat-row"><span>Shabbos in</span><strong id="shabbatIn">--:--</strong></div>
            <div class="shabbat-row"><span>Shabbos out</span><strong id="shabbatOut">--:--</strong></div>
          </div>
          <div class="section-head">
            <h2>Next Up</h2>
            <button class="icon-btn soft" id="openAdd" aria-label="Add reminder" title="Add reminder">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 5v14M5 12h14"/></svg>
            </button>
          </div>
          <div class="agenda-list" id="agendaList"></div>

          <div class="settings-block" aria-label="Settings">
            <div class="section-head">
              <h2>Settings</h2>
            </div>
            <label>
              Google Apps Script URL
              <input id="scriptUrl" type="url" placeholder="https://script.google.com/macros/s/..." />
            </label>
            <label>
              Sync passcode
              <input id="syncToken" autocomplete="off" placeholder="Optional but recommended" />
            </label>
            <label>
              Email address
              <input id="emailAddress" type="email" placeholder="you@gmail.com" />
            </label>
            <label>
              Reminder time
              <input id="reminderTime" type="time" value="04:00" />
            </label>
            <label>
              Timezone
              <input id="timezone" autocomplete="off" placeholder="Africa/Johannesburg" />
            </label>
            <p class="small-copy">Reminders, photos, settings, and Shabbos times sync through Google Sheets once the Apps Script URL is set.</p>
            <button class="primary-btn" id="saveSettings">Save settings</button>
            <button class="text-btn wide" id="syncNow">Sync from Google</button>
            <button class="text-btn wide" id="sendTestEmail">Send Test Email</button>
            <button class="text-btn wide" id="exportData">Export backup</button>
            <p class="settings-result" id="settingsResult" role="status"></p>
          </div>
          <p class="sync-status" id="syncText" data-status="loading">Loading reminders</p>
        </aside>

        <section class="calendar-panel" aria-label="Calendar month">
          <div class="calendar-header">
            <div class="calendar-actions">
              <button class="icon-btn" id="prevMonth" aria-label="Previous month" title="Previous month">
                <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m15 18-6-6 6-6"/></svg>
              </button>
              <button class="text-btn" id="todayBtn">Today</button>
              <button class="icon-btn" id="nextMonth" aria-label="Next month" title="Next month">
                <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m9 18 6-6-6-6"/></svg>
              </button>
            </div>
            <h2 class="month-title" id="monthTitle">Calendar</h2>
          </div>
          <p class="current-date-label" id="currentDateLabel">Today</p>
          <div class="month-frame">
            <div class="weekday-row">
              <span>Sun</span><span>Mon</span><span>Tues</span><span>Wed</span><span>Thu</span><span>Fri</span><span>Shabbos</span>
            </div>
            <div class="calendar-grid" id="calendarGrid"></div>
            <svg class="month-outline" id="monthOutline" viewBox="0 0 7 6" preserveAspectRatio="none" aria-hidden="true">
              <path id="monthOutlinePath"></path>
            </svg>
          </div>
        </section>
      </section>
    </main>

    <dialog id="modal" class="modal">
      <form method="dialog" class="modal-card" id="eventForm">
        <div class="section-head">
          <h2 id="modalTitle">Add Reminder</h2>
          <button class="icon-btn" value="cancel" aria-label="Close" title="Close">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M18 6 6 18M6 6l12 12"/></svg>
          </button>
        </div>
        <input type="hidden" id="eventId" />
        <input type="hidden" id="eventPhotoData" />
        <label>
          Name
          <input id="eventName" autocomplete="off" placeholder="Wedding anniversary" required />
        </label>
        <label>
          Date
          <input id="eventDate" inputmode="numeric" pattern="\d{4}-\d{2}-\d{2}" placeholder="YYYY-MM-DD" required />
        </label>
        <label>
          Repeat
          <select id="eventRepeat">
            <option value="monthly">Monthly</option>
            <option value="yearly" selected>Yearly</option>
            <option value="once">Once</option>
          </select>
        </label>
        <label>
          Photo
          <input id="eventPhoto" type="file" accept="image/*" />
        </label>
        <div class="photo-preview hidden" id="photoPreview"></div>
        <div class="form-actions">
          <button type="button" class="danger-btn hidden" id="deleteBtn">Delete</button>
          <button class="primary-btn" id="saveBtn" value="default">Save</button>
        </div>
      </form>
    </dialog>

    <dialog id="dayModal" class="modal day-modal">
      <div class="modal-card">
        <div class="section-head">
          <h2 id="dayModalTitle">Day</h2>
        </div>
        <div class="day-popup-list" id="dayModalList"></div>
      </div>
    </dialog>

    <script src="config.js"></script>
    <script src="app.js"></script>
  </body>
</html>
